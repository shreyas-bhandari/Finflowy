<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FinFlowy – Context Flow Diagram</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #06061a;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 60px;
      min-height: 100vh;
    }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(120deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .header p { color: #4b5563; font-size: 0.82rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
    .wrap { width: 100%; max-width: 1400px; }
    svg { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Context Flow Diagram</h1>
    <p>FinFlowy &nbsp;·&nbsp; AI-Powered Finance System &nbsp;·&nbsp; Level 0 DFD</p>
  </div>
  <div class="wrap">
  <svg viewBox="0 0 1400 920" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Arrow heads -->
      <marker id="ab" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
        <polygon points="0 0,9 3.5,0 7" fill="#60a5fa"/>
      </marker>
      <marker id="ap" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
        <polygon points="0 0,9 3.5,0 7" fill="#a78bfa"/>
      </marker>
      <marker id="ag" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
        <polygon points="0 0,9 3.5,0 7" fill="#34d399"/>
      </marker>
      <marker id="ao" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
        <polygon points="0 0,9 3.5,0 7" fill="#fb923c"/>
      </marker>
      <marker id="apk" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
        <polygon points="0 0,9 3.5,0 7" fill="#f472b6"/>
      </marker>
      <marker id="ay" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
        <polygon points="0 0,9 3.5,0 7" fill="#fbbf24"/>
      </marker>

      <!-- Glow filter -->
      <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="12" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- Gradients -->
      <radialGradient id="cg" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#2d1f6e"/>
        <stop offset="100%" stop-color="#0d0b1e"/>
      </radialGradient>
      <linearGradient id="ug" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e3a8a"/>
        <stop offset="100%" stop-color="#0c1f4a"/>
      </linearGradient>
      <linearGradient id="adg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#4c1d95"/>
        <stop offset="100%" stop-color="#1e0a3c"/>
      </linearGradient>
      <linearGradient id="dbg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#065f46"/>
        <stop offset="100%" stop-color="#022c22"/>
      </linearGradient>
      <linearGradient id="mlg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#92400e"/>
        <stop offset="100%" stop-color="#3f1a06"/>
      </linearGradient>
      <linearGradient id="mldg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#831843"/>
        <stop offset="100%" stop-color="#3b0a24"/>
      </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1400" height="920" fill="#06061a"/>

    <!-- Subtle dot grid -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#1a1a3a"/>
    </pattern>
    <rect width="1400" height="920" fill="url(#dots)"/>

    <!-- ═══════ CENTER PROCESS BUBBLE ═══════ -->
    <!-- Outer glow ring -->
    <circle cx="700" cy="470" r="158" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.3" filter="url(#glow2)"/>
    <circle cx="700" cy="470" r="150" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <!-- Main circle -->
    <circle cx="700" cy="470" r="143" fill="url(#cg)" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>
    <!-- Center text -->
    <text x="700" y="452" text-anchor="middle" fill="#e2d9f3" font-size="17" font-weight="700" font-family="Inter" letter-spacing="1">FinFlowy</text>
    <text x="700" y="475" text-anchor="middle" fill="#c4b5fd" font-size="13" font-family="Inter">AI Finance System</text>
    <text x="700" y="496" text-anchor="middle" fill="#7c6fad" font-size="11" font-family="Inter" letter-spacing="2">PROCESS 1.0</text>

    <!-- ═══════ ENTITY: USER (top-center) ═══════ -->
    <rect x="560" y="28" width="280" height="70" rx="10" fill="url(#ug)" stroke="#60a5fa" stroke-width="1.5" filter="url(#glow)"/>
    <text x="700" y="57" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="Inter" font-weight="600" letter-spacing="2">EXTERNAL ENTITY</text>
    <text x="700" y="80" text-anchor="middle" fill="#dbeafe" font-size="17" font-family="Inter" font-weight="700">User</text>

    <!-- ═══════ ENTITY: ADMIN (top-right) ═══════ -->
    <rect x="1080" y="100" width="260" height="70" rx="10" fill="url(#adg)" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
    <text x="1210" y="129" text-anchor="middle" fill="#c4b5fd" font-size="11" font-family="Inter" font-weight="600" letter-spacing="2">EXTERNAL ENTITY</text>
    <text x="1210" y="152" text-anchor="middle" fill="#ede9fe" font-size="17" font-family="Inter" font-weight="700">Admin</text>

    <!-- ═══════ DATABASE: Auth DB (left top) ═══════ -->
    <!-- Cylinder shape -->
    <rect x="30" y="155" width="190" height="80" rx="4" fill="url(#dbg)" stroke="#34d399" stroke-width="1.5"/>
    <ellipse cx="125" cy="155" rx="95" ry="18" fill="#065f46" stroke="#34d399" stroke-width="1.5"/>
    <ellipse cx="125" cy="235" rx="95" ry="18" fill="#043d2c" stroke="#34d399" stroke-width="1.5"/>
    <text x="125" y="191" text-anchor="middle" fill="#6ee7b7" font-size="10" font-family="Inter" font-weight="600" letter-spacing="1.5">DATABASE 1</text>
    <text x="125" y="208" text-anchor="middle" fill="#d1fae5" font-size="14" font-family="Inter" font-weight="700">Auth DB</text>
    <text x="125" y="224" text-anchor="middle" fill="#6ee7b7" font-size="10" font-family="Inter">auth_finflowy · :27017</text>

    <!-- ═══════ DATABASE: Transaction DB (left mid) ═══════ -->
    <rect x="30" y="400" width="190" height="80" rx="4" fill="url(#dbg)" stroke="#34d399" stroke-width="1.5"/>
    <ellipse cx="125" cy="400" rx="95" ry="18" fill="#065f46" stroke="#34d399" stroke-width="1.5"/>
    <ellipse cx="125" cy="480" rx="95" ry="18" fill="#043d2c" stroke="#34d399" stroke-width="1.5"/>
    <text x="125" y="436" text-anchor="middle" fill="#6ee7b7" font-size="10" font-family="Inter" font-weight="600" letter-spacing="1.5">DATABASE 2</text>
    <text x="125" y="453" text-anchor="middle" fill="#d1fae5" font-size="13" font-family="Inter" font-weight="700">Transaction DB</text>
    <text x="125" y="469" text-anchor="middle" fill="#6ee7b7" font-size="10" font-family="Inter">transaction_finflowy · :27019</text>

    <!-- ═══════ DATABASE: Goal DB (left bottom) ═══════ -->
    <rect x="30" y="650" width="190" height="80" rx="4" fill="url(#dbg)" stroke="#34d399" stroke-width="1.5"/>
    <ellipse cx="125" cy="650" rx="95" ry="18" fill="#065f46" stroke="#34d399" stroke-width="1.5"/>
    <ellipse cx="125" cy="730" rx="95" ry="18" fill="#043d2c" stroke="#34d399" stroke-width="1.5"/>
    <text x="125" y="686" text-anchor="middle" fill="#6ee7b7" font-size="10" font-family="Inter" font-weight="600" letter-spacing="1.5">DATABASE 3</text>
    <text x="125" y="703" text-anchor="middle" fill="#d1fae5" font-size="14" font-family="Inter" font-weight="700">Goal DB</text>
    <text x="125" y="719" text-anchor="middle" fill="#6ee7b7" font-size="10" font-family="Inter">goal_finflowy · :27020</text>

    <!-- ═══════ ML SERVICE (right mid) ═══════ -->
    <rect x="1080" y="420" width="265" height="80" rx="10" fill="url(#mlg)" stroke="#fb923c" stroke-width="1.5" filter="url(#glow)"/>
    <text x="1212" y="449" text-anchor="middle" fill="#fcd34d" font-size="11" font-family="Inter" font-weight="600" letter-spacing="2">ML MICROSERVICE</text>
    <text x="1212" y="472" text-anchor="middle" fill="#fed7aa" font-size="16" font-family="Inter" font-weight="700">ML Service</text>
    <text x="1212" y="491" text-anchor="middle" fill="#fdba74" font-size="10" font-family="Inter">Python FastAPI · Port 5001</text>

    <!-- ═══════ DATABASE: ML DB (right bottom) ═══════ -->
    <rect x="1085" y="668" width="185" height="75" rx="4" fill="url(#mldg)" stroke="#f472b6" stroke-width="1.5"/>
    <ellipse cx="1178" cy="668" rx="92" ry="17" fill="#831843" stroke="#f472b6" stroke-width="1.5"/>
    <ellipse cx="1178" cy="743" rx="92" ry="17" fill="#500d2a" stroke="#f472b6" stroke-width="1.5"/>
    <text x="1178" y="702" text-anchor="middle" fill="#fbcfe8" font-size="10" font-family="Inter" font-weight="600" letter-spacing="1.5">DATABASE 4</text>
    <text x="1178" y="718" text-anchor="middle" fill="#fce7f3" font-size="13" font-family="Inter" font-weight="700">ML Alert DB</text>
    <text x="1178" y="733" text-anchor="middle" fill="#f9a8d4" font-size="10" font-family="Inter">ml_finflowy · :27018</text>


    <!-- ════════════════════════════════════════ -->
    <!--        ARROWS & DATA FLOWS              -->
    <!-- ════════════════════════════════════════ -->

    <!-- 1. User → System: Login / Register / Add Data -->
    <path d="M 720 98 L 720 327" stroke="#60a5fa" stroke-width="1.8" fill="none" marker-end="url(#ab)"/>
    <!-- 2. System → User: JWT / Dashboard / Insights -->
    <path d="M 678 327 L 678 98" stroke="#a78bfa" stroke-width="1.8" fill="none" marker-end="url(#ap)"/>

    <!-- Labels: User ↔ System -->
    <rect x="736" y="155" width="195" height="78" rx="6" fill="#06061a" fill-opacity="0.85"/>
    <text x="745" y="172" fill="#60a5fa" font-size="10.5" font-family="Inter" font-weight="600">→ Login Credentials</text>
    <text x="745" y="188" fill="#60a5fa" font-size="10.5" font-family="Inter" font-weight="600">→ Registration Data</text>
    <text x="745" y="204" fill="#60a5fa" font-size="10.5" font-family="Inter" font-weight="600">→ Transaction Data</text>
    <text x="745" y="220" fill="#60a5fa" font-size="10.5" font-family="Inter" font-weight="600">→ Goal Data</text>

    <rect x="450" y="152" width="215" height="90" rx="6" fill="#06061a" fill-opacity="0.85"/>
    <text x="460" y="170" fill="#a78bfa" font-size="10.5" font-family="Inter" font-weight="600">← JWT Auth Token</text>
    <text x="460" y="186" fill="#a78bfa" font-size="10.5" font-family="Inter" font-weight="600">← Dashboard Summary</text>
    <text x="460" y="202" fill="#a78bfa" font-size="10.5" font-family="Inter" font-weight="600">← AI Insights &amp; Alerts</text>
    <text x="460" y="218" fill="#a78bfa" font-size="10.5" font-family="Inter" font-weight="600">← Goal Predictions</text>
    <text x="460" y="234" fill="#a78bfa" font-size="10.5" font-family="Inter" font-weight="600">← Predicted Expenses</text>

    <!-- 3. Admin → System -->
    <path d="M 1083 155 C 980 155 870 380 843 392" stroke="#a78bfa" stroke-width="1.8" fill="none" marker-end="url(#ap)"/>
    <!-- 4. System → Admin -->
    <path d="M 832 370 C 900 230 1000 145 1083 140" stroke="#c4b5fd" stroke-width="1.8" fill="none" marker-end="url(#ap)" stroke-dasharray="5,3"/>

    <!-- Labels: Admin ↔ System -->
    <rect x="880" y="218" width="185" height="55" rx="6" fill="#06061a" fill-opacity="0.9"/>
    <text x="890" y="237" fill="#a78bfa" font-size="10.5" font-family="Inter" font-weight="600">→ Admin Login</text>
    <text x="890" y="253" fill="#a78bfa" font-size="10.5" font-family="Inter" font-weight="600">→ Delete User Request</text>
    <text x="890" y="269" fill="#c4b5fd" font-size="10.5" font-family="Inter" font-weight="600">← User List / Controls</text>

    <!-- 5. Auth DB → System -->
    <path d="M 220 192 L 557 415" stroke="#34d399" stroke-width="1.8" fill="none" marker-end="url(#ag)"/>
    <!-- 6. System → Auth DB -->
    <path d="M 553 432 L 218 208" stroke="#6ee7b7" stroke-width="1.8" fill="none" marker-end="url(#ag)" stroke-dasharray="5,3"/>

    <!-- Labels: Auth DB ↔ System -->
    <rect x="280" y="278" width="195" height="42" rx="6" fill="#06061a" fill-opacity="0.9"/>
    <text x="290" y="296" fill="#34d399" font-size="10.5" font-family="Inter" font-weight="600">→ User Records / Credentials</text>
    <text x="290" y="312" fill="#6ee7b7" font-size="10.5" font-family="Inter" font-weight="600">← Store User Data</text>

    <!-- 7. Trans DB → System -->
    <path d="M 220 452 L 555 460" stroke="#34d399" stroke-width="1.8" fill="none" marker-end="url(#ag)"/>
    <!-- 8. System → Trans DB -->
    <path d="M 555 475 L 220 467" stroke="#6ee7b7" stroke-width="1.8" fill="none" marker-end="url(#ag)" stroke-dasharray="5,3"/>

    <!-- Labels: Trans DB ↔ System -->
    <rect x="248" y="426" width="205" height="42" rx="6" fill="#06061a" fill-opacity="0.9"/>
    <text x="258" y="444" fill="#34d399" font-size="10.5" font-family="Inter" font-weight="600">→ Transaction Records</text>
    <text x="258" y="460" fill="#6ee7b7" font-size="10.5" font-family="Inter" font-weight="600">← Store Transactions</text>

    <!-- 9. Goal DB → System -->
    <path d="M 220 685 L 557 520" stroke="#34d399" stroke-width="1.8" fill="none" marker-end="url(#ag)"/>
    <!-- 10. System → Goal DB -->
    <path d="M 553 535 L 215 700" stroke="#6ee7b7" stroke-width="1.8" fill="none" marker-end="url(#ag)" stroke-dasharray="5,3"/>

    <!-- Labels: Goal DB ↔ System -->
    <rect x="272" y="572" width="185" height="42" rx="6" fill="#06061a" fill-opacity="0.9"/>
    <text x="282" y="590" fill="#34d399" font-size="10.5" font-family="Inter" font-weight="600">→ Goal Records</text>
    <text x="282" y="606" fill="#6ee7b7" font-size="10.5" font-family="Inter" font-weight="600">← Store Goal Data</text>

    <!-- 11. System → ML Service (sends data) -->
    <path d="M 843 462 L 1080 458" stroke="#fb923c" stroke-width="1.8" fill="none" marker-end="url(#ao)"/>
    <!-- 12. ML Service → System (returns results) -->
    <path d="M 1080 478 L 843 480" stroke="#fbbf24" stroke-width="1.8" fill="none" marker-end="url(#ay)" stroke-dasharray="5,3"/>

    <!-- Labels: ML Service ↔ System -->
    <rect x="868" y="418" width="205" height="57" rx="6" fill="#06061a" fill-opacity="0.9"/>
    <text x="878" y="436" fill="#fb923c" font-size="10.5" font-family="Inter" font-weight="600">→ Transaction Data</text>
    <text x="878" y="452" fill="#fbbf24" font-size="10.5" font-family="Inter" font-weight="600">← Behavior Analysis</text>
    <text x="878" y="468" fill="#fbbf24" font-size="10.5" font-family="Inter" font-weight="600">← Expense Predictions</text>

    <!-- 13. ML Service → ML DB (one-way, write alert logs) -->
    <path d="M 1178 500 L 1178 651" stroke="#f472b6" stroke-width="1.8" fill="none" marker-end="url(#apk)"/>

    <!-- Labels: ML → ML DB -->
    <rect x="1188" y="565" width="155" height="28" rx="6" fill="#06061a" fill-opacity="0.9"/>
    <text x="1198" y="583" fill="#f472b6" font-size="10.5" font-family="Inter" font-weight="600">→ Write Alert Logs</text>

    <!-- ═══════ LEGEND ═══════ -->
    <rect x="30" y="836" width="780" height="68" rx="10" fill="#0d0d2a" stroke="#1e1e4a" stroke-width="1"/>
    <text x="50" y="858" fill="#6b7280" font-size="11" font-family="Inter" font-weight="700" letter-spacing="1.5">LEGEND</text>
    <!-- Solid line -->
    <line x1="50" y1="875" x2="110" y2="875" stroke="#60a5fa" stroke-width="2"/>
    <polygon points="110,871 119,875 110,879" fill="#60a5fa"/>
    <text x="126" y="879" fill="#9ca3af" font-size="11" font-family="Inter">Primary Data Flow (Input)</text>
    <!-- Dashed line -->
    <line x1="320" y1="875" x2="380" y2="875" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="380,871 389,875 380,879" fill="#a78bfa"/>
    <text x="396" y="879" fill="#9ca3af" font-size="11" font-family="Inter">Response / Output Flow</text>
    <!-- DB symbol -->
    <ellipse cx="590" cy="872" rx="18" ry="6" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <rect x="572" y="872" width="36" height="12" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <ellipse cx="590" cy="884" rx="18" ry="6" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <text x="614" y="879" fill="#9ca3af" font-size="11" font-family="Inter">= Separate MongoDB Instance</text>

    <!-- ═══════ FOOTER ═══════ -->
    <text x="700" y="907" text-anchor="middle" fill="#374151" font-size="10" font-family="Inter" letter-spacing="1">
      FinFlowy · Database-per-Service Microservice Architecture · 4 Isolated MongoDB Instances
    </text>
  </svg>
  </div>
</body>
</html>
