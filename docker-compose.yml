version: '3.8'

# ──────────────────────────────────────────────────────────────────
#  FinFlowy — Database-per-Service Microservice Architecture
#
#  DB 1: mongodb-auth        :27017 → auth_finflowy        (Users)
#  DB 2: mongodb-ml          :27018 → ml_finflowy          (Alert Logs)
#  DB 3: mongodb-transaction :27019 → transaction_finflowy (Transactions)
#  DB 4: mongodb-goal        :27020 → goal_finflowy        (Goals)
# ──────────────────────────────────────────────────────────────────

services:

  # ── DB 1: Auth Database ──────────────────────────────────────────
  mongodb-auth:
    image: mongo:latest
    container_name: mongodb-auth
    ports:
      - "27017:27017"
    volumes:
      - mongodb_auth_data:/data/db
    networks:
      - ai-finance-network

  # ── DB 2: ML / Insights Database ────────────────────────────────
  mongodb-ml:
    image: mongo:latest
    container_name: mongodb-ml
    ports:
      - "27018:27017"
    volumes:
      - mongodb_ml_data:/data/db
    networks:
      - ai-finance-network

  # ── DB 3: Transaction Database ───────────────────────────────────
  mongodb-transaction:
    image: mongo:latest
    container_name: mongodb-transaction
    ports:
      - "27019:27017"
    volumes:
      - mongodb_transaction_data:/data/db
    networks:
      - ai-finance-network

  # ── DB 4: Goal Database ──────────────────────────────────────────
  mongodb-goal:
    image: mongo:latest
    container_name: mongodb-goal
    ports:
      - "27020:27017"
    volumes:
      - mongodb_goal_data:/data/db
    networks:
      - ai-finance-network

  # ── ML Service ───────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ML_Service
      dockerfile: Dockerfile
    container_name: ml-service
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongodb-ml:27017/ml_finflowy
    depends_on:
      - mongodb-ml
    restart: on-failure
    networks:
      - ai-finance-network

  # ── Backend API ──────────────────────────────────────────────────
  backend-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - AUTH_DB_URI=mongodb://mongodb-auth:27017/auth_finflowy
      - TRANSACTION_DB_URI=mongodb://mongodb-transaction:27017/transaction_finflowy
      - GOAL_DB_URI=mongodb://mongodb-goal:27017/goal_finflowy
      - ML_API_URL=http://ml-service:5001/api/ml
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb-auth
      - mongodb-transaction
      - mongodb-goal
      - ml-service
    restart: on-failure
    networks:
      - ai-finance-network

  # ── Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: frontend-ui
    ports:
      - "80:80"
    depends_on:
      - backend-api
    restart: on-failure
    networks:
      - ai-finance-network

networks:
  ai-finance-network:
    driver: bridge

volumes:
  mongodb_auth_data:
  mongodb_ml_data:
  mongodb_transaction_data:
  mongodb_goal_data:
